name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: macos-arm
          - platform: macos-13
            args: --target x86_64-apple-darwin
            label: macos-intel
          - platform: windows-latest
            args: ''
            label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || contains(matrix.args, 'x86_64') && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LDC v__VERSION__
          releaseBody: |
            ## LDC — Logiciel de Caisse v__VERSION__

            ### Téléchargement
            | Système | Fichier |
            |---------|---------|
            | macOS Apple Silicon | `LDC_aarch64.dmg` |
            | macOS Intel | `LDC_x64.dmg` |
            | Windows | `LDC_setup.exe` |

            ### Installation
            - **macOS** : ouvrez le `.dmg`, glissez LDC dans Applications.
              > Si macOS bloque l'ouverture : clic droit → Ouvrir → Ouvrir quand même.
            - **Windows** : lancez le `.exe` et suivez l'assistant.

            ---
            > ⚠️ Version bêta — merci de signaler tout bug via **Paramètres → Envoyer un retour**.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
